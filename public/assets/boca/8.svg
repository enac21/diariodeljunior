<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100" height="60">
  <!-- Boca de conejo/dientes largos -->
  <ellipse cx="50" cy="30" rx="30" ry="20" fill="#fff"/>
  <ellipse cx="50" cy="30" rx="30" ry="20" stroke="#2c3e50" stroke-width="2" fill="none"/>
  <!-- Dientes conejo -->
  <rect x="40" y="20" width="8" height="20" rx="2" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <rect x="52" y="20" width="8" height="20" rx="2" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <!-- Línea media -->
  <line x1="50" y1="20" x2="50" y2="50" stroke="#ddd" stroke-width="1"/>
</svg>