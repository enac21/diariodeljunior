<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50" width="100" height="50">
  <!-- Ojos loading spinner -->
  <circle cx="30" cy="25" r="12" fill="none" stroke="#3498db" stroke-width="3" stroke-dasharray="20 10">
    <animateTransform attributeName="transform" type="rotate" from="0 30 25" to="360 30 25" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="25" r="12" fill="none" stroke="#3498db" stroke-width="3" stroke-dasharray="20 10">
    <animateTransform attributeName="transform" type="rotate" from="0 70 25" to="360 70 25" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>